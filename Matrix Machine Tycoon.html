<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matrix Machine Tycoon</title>
  <style>
    :root {
      --bg: #03050a;
      --panel: #101727;
      --panel-soft: #162039;
      --line: #2a3d60;
      --text: #d9f2ff;
      --muted: #8aa2bf;
      --green: #53ff9e;
      --amber: #ffc857;
      --red: #ff5f6d;
      --blue: #76b8ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, system-ui, sans-serif;
      background: radial-gradient(circle at top, #0b1425, var(--bg));
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
    }
    .app { max-width: 1200px; margin: 0 auto; display: grid; gap: 16px; grid-template-columns: 330px 1fr; }
    .panel {
      background: linear-gradient(180deg, var(--panel), var(--panel-soft));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,.3);
    }
    h1 { margin: 0 0 8px; font-size: 1.5rem; }
    p { margin: 0 0 10px; color: var(--muted); }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0; }
    .stat { background: rgba(0,0,0,.25); border: 1px solid var(--line); border-radius: 10px; padding: 8px; }
    .label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .value { font-size: 1.2rem; font-weight: 700; margin-top: 4px; }
    .actions { display: grid; gap: 8px; }
    button {
      border: 1px solid var(--line);
      background: #162543;
      color: var(--text);
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
      text-align: left;
      transition: .15s;
      font-weight: 600;
    }
    button:hover { transform: translateY(-1px); background: #1b3055; }
    button small { display: block; color: var(--muted); font-weight: 500; }
    .world-wrap { display: grid; gap: 10px; }
    .toolbar { display:flex; flex-wrap: wrap; gap:8px; }
    .tool { text-align: center; flex: 1 1 130px; }
    .tool.active { border-color: var(--green); box-shadow: 0 0 0 1px rgba(83,255,158,.35) inset; }
    #world {
      width: 100%;
      aspect-ratio: 1.5;
      border: 1px solid var(--line);
      border-radius: 12px;
      image-rendering: pixelated;
      background: #02080f;
      cursor: crosshair;
    }
    .event-log { max-height: 170px; overflow: auto; font-size: .9rem; border-top:1px dashed var(--line); margin-top:12px; padding-top:10px; }
    .event-log li { margin-bottom: 6px; color: #b8d7f3; }
    .hint { font-size:.83rem; color: var(--muted); }
    @media (max-width: 900px){ .app { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <h1>Matrix Machine Tycoon</h1>
      <p>Build a machine-run virtual metropolis, keep humans pacified, and outmaneuver Zion incursions.</p>

      <div class="stats">
        <div class="stat"><div class="label">Cycle Day</div><div id="day" class="value">1</div></div>
        <div class="stat"><div class="label">Energy</div><div id="energy" class="value">100</div></div>
        <div class="stat"><div class="label">Stability</div><div id="stability" class="value">75%</div></div>
        <div class="stat"><div class="label">Awareness</div><div id="awareness" class="value">20%</div></div>
      </div>

      <div class="actions">
        <button id="nextDay">Advance Simulation Day<small>Run machine logistics, power economy, and anomaly checks.</small></button>
        <button id="purge">Deploy Sentinel Sweep (-20 energy)<small>Suppress red-pill activity and lower awareness.</small></button>
        <button id="patch">Architectural Patch (-15 energy)<small>Increase stability with controlled narrative resets.</small></button>
      </div>

      <ul id="log" class="event-log"></ul>
    </aside>

    <main class="panel world-wrap">
      <div class="toolbar">
        <button class="tool active" data-tool="reactor">⚡ Reactor<small>+Energy / -Stability nearby</small></button>
        <button class="tool" data-tool="district">🏙️ District<small>+Population comfort</small></button>
        <button class="tool" data-tool="agent">🕶️ Agent Hub<small>-Awareness zone</small></button>
        <button class="tool" data-tool="anomaly">🧍 Anomaly Node<small>High risk / High score</small></button>
      </div>
      <canvas id="world" width="900" height="600" aria-label="Matrix city grid"></canvas>
      <div class="hint">Click empty tiles to build. Keep Stability above 25% and Awareness below 95% or the simulation collapses.</div>
    </main>
  </div>

  <script>
    const tileSize = 30;
    const cols = 30;
    const rows = 20;
    const grid = Array.from({ length: rows }, () => Array(cols).fill('empty'));
    const colors = { empty:'#07101d', reactor:'#33ff99', district:'#6aa8ff', agent:'#ffc857', anomaly:'#ff5f6d' };
    const state = { day:1, energy:100, stability:75, awareness:20, score:0, tool:'reactor', gameOver:false };
    const costs = { reactor:24, district:16, agent:20, anomaly:10 };

    const canvas = document.getElementById('world');
    const ctx = canvas.getContext('2d');
    const logEl = document.getElementById('log');

    function log(msg){
      const li = document.createElement('li');
      li.textContent = `Day ${state.day}: ${msg}`;
      logEl.prepend(li);
      while (logEl.children.length > 18) logEl.removeChild(logEl.lastChild);
    }

    function draw(){
      ctx.fillStyle = '#02080f'; ctx.fillRect(0,0,canvas.width,canvas.height);
      for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
          const t = grid[r][c];
          const x = c*tileSize; const y = r*tileSize;
          ctx.fillStyle = colors[t];
          ctx.fillRect(x+1,y+1,t==='empty'?tileSize-2:tileSize-3,t==='empty'?tileSize-2:tileSize-3);
          if (t !== 'empty') {
            ctx.strokeStyle = 'rgba(255,255,255,.15)';
            ctx.strokeRect(x+3,y+3,tileSize-6,tileSize-6);
          }
        }
      }
    }

    function updateHUD(){
      document.getElementById('day').textContent = state.day;
      document.getElementById('energy').textContent = Math.round(state.energy);
      document.getElementById('stability').textContent = `${Math.max(0,Math.min(100,Math.round(state.stability)))}%`;
      document.getElementById('awareness').textContent = `${Math.max(0,Math.min(100,Math.round(state.awareness)))}%`;
    }

    function count(type){ return grid.flat().filter(t=>t===type).length; }

    function simulateDay(){
      if (state.gameOver) return;
      state.day++;
      const reactors = count('reactor');
      const districts = count('district');
      const agents = count('agent');
      const anomalies = count('anomaly');

      state.energy += reactors * 11 + districts * 2 - (agents * 3 + anomalies * 2 + 6);
      state.stability += districts * 0.5 + agents * 0.7 - reactors * 0.5 - anomalies * 1.6 + (Math.random()*2-1.2);
      state.awareness += anomalies * 1.8 + Math.max(0, districts-reactors) * 0.4 - agents * 1.3 + (Math.random()*2-0.6);
      state.score += reactors*3 + districts*4 + agents*3 + anomalies*8;

      if (Math.random() < 0.2 + anomalies*0.02) {
        state.awareness += 8;
        state.stability -= 4;
        log('A Zion broadcast leaked into the city feed.');
      }

      if (state.energy < 0) {
        state.stability -= 8;
        log('Energy deficit caused cascading simulation glitches.');
      }

      checkEnd();
      updateHUD();
      draw();
    }

    function checkEnd(){
      if (state.stability <= 25 || state.awareness >= 95) {
        state.gameOver = true;
        log(`Simulation collapse. Final score: ${Math.round(state.score)}. Reload to begin a new cycle.`);
      }
    }

    function usePower(type){
      if (state.gameOver) return;
      if (type === 'purge') {
        if (state.energy < 20) return log('Not enough energy for Sentinel sweep.');
        state.energy -= 20; state.awareness -= 12; state.stability -= 2; log('Sentinel sweep removed insurgent hotspots.');
      }
      if (type === 'patch') {
        if (state.energy < 15) return log('Not enough energy for architecture patch.');
        state.energy -= 15; state.stability += 10; state.awareness += 2; log('Architect rolled out a narrative consistency patch.');
      }
      updateHUD(); checkEnd();
    }

    canvas.addEventListener('click', e => {
      if (state.gameOver) return;
      const rect = canvas.getBoundingClientRect();
      const c = Math.floor((e.clientX-rect.left) * (canvas.width/rect.width) / tileSize);
      const r = Math.floor((e.clientY-rect.top) * (canvas.height/rect.height) / tileSize);
      if (!grid[r] || grid[r][c] !== 'empty') return;
      const cost = costs[state.tool];
      if (state.energy < cost) return log(`Insufficient energy to place ${state.tool}.`);
      state.energy -= cost;
      grid[r][c] = state.tool;
      state.stability += state.tool === 'district' ? 1 : 0;
      state.awareness += state.tool === 'anomaly' ? 2 : 0;
      log(`Constructed ${state.tool} at sector ${c+1}-${r+1}.`);
      updateHUD(); draw(); checkEnd();
    });

    document.querySelectorAll('.tool').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tool').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.tool = btn.dataset.tool;
      });
    });

    document.getElementById('nextDay').addEventListener('click', simulateDay);
    document.getElementById('purge').addEventListener('click', () => usePower('purge'));
    document.getElementById('patch').addEventListener('click', () => usePower('patch'));

    log('Machine council initialized the new Matrix cycle.');
    draw();
    updateHUD();
  </script>
</body>
</html>
